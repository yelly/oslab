<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#fca5a5" stop-opacity="0.9"/>
      <stop offset="50%"  stop-color="#ef4444" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#ef4444" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Soft glow halo -->
  <circle cx="50" cy="50" r="46" fill="url(#glow)"/>

  <!-- Light rays -->
  <g stroke="#3b82f6" stroke-width="3.5" stroke-linecap="round" opacity="0.75">
    <line x1="50" y1="8"  x2="50" y2="21"/>
    <line x1="50" y1="79" x2="50" y2="92"/>
    <line x1="8"  y1="50" x2="21" y2="50"/>
    <line x1="79" y1="50" x2="92" y2="50"/>
    <line x1="19" y1="19" x2="28" y2="28"/>
    <line x1="72" y1="72" x2="81" y2="81"/>
    <line x1="81" y1="19" x2="72" y2="28"/>
    <line x1="19" y1="81" x2="28" y2="72"/>
  </g>

  <!-- Mineral grain (irregular crystal shape) -->
  <polygon points="50,30 64,40 66,55 55,68 42,66 34,53 36,39" fill="#ef4444"/>
  <polygon points="50,30 64,40 66,55 55,68 42,66 34,53 36,39" fill="#fca5a5" opacity="0.5"
    transform="translate(-3,-3)"/>
</svg>

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            artifact: 'dist/release/*.dmg'
          - os: windows-latest
            artifact: 'dist/release/*.exe'
          - os: ubuntu-latest
            artifact: 'dist/release/*.AppImage'

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - run: npm run electron:build

      - uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact }}

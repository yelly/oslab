name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
          - os: windows-latest
          - os: ubuntu-latest

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Exclude workspace from Windows Defender
        if: runner.os == 'Windows'
        shell: powershell
        run: Add-MpPreference -ExclusionPath "${{ github.workspace }}"

      - run: npm ci

      - name: Extract tag annotation
        id: tag
        run: |
          delimiter="$(openssl rand -hex 8)"
          echo "body<<$delimiter" >> "$GITHUB_OUTPUT"
          git tag -l --format='%(contents)' "${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          echo "$delimiter" >> "$GITHUB_OUTPUT"
        shell: bash

      - run: npm run electron:build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_NOTES: ${{ steps.tag.outputs.body }}

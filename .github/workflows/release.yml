name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            artifact: 'dist/release/*.dmg'
          - os: windows-latest
            artifact: 'dist/release/*.exe'
          - os: ubuntu-latest
            artifact: 'dist/release/*.AppImage'

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - run: npm run electron:build

      - name: Extract tag annotation
        id: tag
        run: |
          delimiter="$(openssl rand -hex 8)"
          echo "body<<$delimiter" >> "$GITHUB_OUTPUT"
          git tag -l --format='%(contents)' "${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          echo "$delimiter" >> "$GITHUB_OUTPUT"
        shell: bash

      - uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact }}
          body: ${{ steps.tag.outputs.body }}
